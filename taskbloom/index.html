<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic page setup -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskBloom</title>

    <!-- External CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main application wrapper -->
    <div class="app-container">
        <!-- Header section -->
        <header class="app-header">
            <h1>TaskBloom</h1>
            <p class="subtitle">Organize your day beautifully, one task at a time.</p>
        </header>

        <!-- Input section for adding new tasks -->
        <section class="todo-input-section">
            <input 
                type="text" 
                id="todo-input" 
                placeholder="Enter a new task..."
                aria-label="Enter a new task"
            >
            <button id="add-btn">Add Task</button>
        </section>

        <!-- Validation message -->
        <p id="error-message"></p>

        <!-- Info section -->
         <section class="todo-info">
    <div class="status-card">
        <p id="task-status">Total Tasks: 0</p>
        <p id="pending-status">Pending: 0</p>
        <p id="completed-status">Completed: 0</p>
    </div>
        </section>

        <!-- Container where tasks will appear -->
        <section class="todo-list-section">
            <ul id="todo-list"></ul>
        </section>
    </div>
    <audio id="complete-sound" preload="auto">
        <source src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg" type="audio/ogg">
    </audio>

    <!-- External JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
